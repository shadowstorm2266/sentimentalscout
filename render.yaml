services:
  - type: web
    name: sentimental-scout-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: PRO_STARS_PRICE
        value: "100"
